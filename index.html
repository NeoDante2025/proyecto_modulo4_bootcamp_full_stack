<!doctype html>
<html lang="es">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>TaskFlow - Gestión de Tareas</title>

        <!-- Bootstrap CSS -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet" />
    </head>
    <body class="bg-light">
        <div class="container py-5">
            <!--Notificacion para mostrar que la tarea fue mostrada correctamente-->
            <div
                id="notificacion"
                class="alert alert-success text-center"
                style="display: none">
                Tarea agregada correctamente
            </div>
            <h1 class="text-center mb-4">Lista de Tareas</h1>
            <!--formulario que muestra toda la informacion de la tareas y el agregar tareas-->
            <form id="formTarea" class="row g-2 mb-4 justify-content-center">
                <div class="col-8 col-md-6">
                    <div class="form-control p-2">
                        <input
                            type="text"
                            id="tareaInput"
                            class="border-0 w-100 p-0"
                            style="outline: none;"
                            placeholder="Escribe una nueva tarea...">
                        <small id="previewTexto"
                            class="text-muted d-block"></small>
                    </div>
                </div>

                <div class="col-4 col-md-2">
                    <input
                        type="datetime-local"
                        id="fechaLimiteInput"
                        class="form-control"
                        required />

                </div>

                <div class="col-4 col-md-2 d-flex align-items-end">
                    <!--boton para agregar la tarea-->
                    <button type="submit"
                        class="btn btn-primary w-100">Agregar</button>
                </div>
            </form>

            <ul id="listaTareas" class="list-group col-md-10 mx-auto">
                <!-- para mostrar la lista de tareas que se agregan  -->
            </ul>
        </div>

        <!--Bootstrap JS-->
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

        <!-- Nuestro código -->
        <script type="module" src="assets/index.js"></script>
    </body>
</html>
